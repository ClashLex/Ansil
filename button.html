<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@700;800&family=Syne+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink:    #0a0a0a;
      --bg:     #d7f34b;
      --blue:   #a8ddf5;
      --pink:   #f6b3d3;
      --orange: #ffcb8c;
      --purple: #c9b6ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: var(--bg);
      background-image: radial-gradient(var(--ink) 1.5px, transparent 1.5px);
      background-size: 36px 36px;
      font-family: 'Syne', sans-serif;
      cursor: none;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Dramatic noise overlay */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)"/></svg>');
      opacity: 0.08;
      z-index: 200;
    }

    /* ── CUSTOM CURSOR ── */
    #cursor {
      position: fixed;
      width: 20px; height: 20px;
      background: var(--ink);
      border: 2px solid var(--ink);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                  height 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                  background 0.1s, border-radius 0.1s;
    }
    #cursor.grow {
      width: 56px; height: 56px;
      background: var(--pink);
      border-radius: 50%;
      mix-blend-mode: difference;
    }

    /* ── MARQUEE ── */
    .marquee-wrap {
      background: var(--ink);
      border-bottom: 4px solid var(--ink);
      overflow: hidden;
      padding: clamp(12px, 2vw, 24px) 0;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .marquee-track {
      display: flex;
      animation: marquee 14s linear infinite;
      white-space: nowrap;
    }
    .marquee-track span {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(24px, 4vw, 40px);
      color: var(--bg);
      letter-spacing: 0.08em;
      padding: 0 40px;
    }
    .marquee-track span.sep { color: var(--pink); padding: 0 10px; }
    @keyframes marquee {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ── MAIN LAYOUT ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(40px, 8vw, 80px) 20px;
      gap: clamp(24px, 4vw, 48px);
      position: relative;
      z-index: 1;
    }

    /* ── FLUID PILL BUTTONS ── */
    .cta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 2vw, 24px);
      
      /* Fluid Width: grows massive on desktop, fits mobile */
      width: clamp(300px, 75vw, 800px);
      
      /* Reverted to the initial "pill/oval" shape */
      border-radius: 999px; 
      border: clamp(4px, 0.6vw, 6px) solid var(--ink);
      padding: clamp(20px, 3vw, 40px) clamp(30px, 5vw, 60px);
      
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      /* Fluid Typography */
      font-size: clamp(20px, 3.5vw, 42px);
      letter-spacing: 0.02em;
      color: var(--ink);
      text-transform: uppercase;
      text-decoration: none;
      
      /* Fluid Graphic Shadow */
      box-shadow: clamp(8px, 1.5vw, 16px) clamp(8px, 1.5vw, 16px) 0 var(--ink);
      cursor: none;
      
      transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), 
                  box-shadow 0.15s cubic-bezier(0.4, 0, 0.2, 1), 
                  filter 0.15s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      
      /* Initial staggered animation */
      opacity: 0;
      animation: pillIn 0.6s cubic-bezier(.22,1,.36,1) forwards;
    }

    .cta .logo {
      /* Fluid Logo Size */
      width: clamp(28px, 4.5vw, 56px); 
      height: clamp(28px, 4.5vw, 56px);
      fill: currentColor;
      flex-shrink: 0;
    }

    /* Distinct Palettes */
    .blue   { background: var(--blue); }
    .pink   { background: var(--pink); }
    .orange { background: var(--orange); }
    .purple { background: var(--purple); }

    /* Subtle Chaotic Tilts */
    .cta:nth-child(1) { transform: rotate(-2deg); animation-delay: 0.1s; }
    .cta:nth-child(2) { transform: rotate(3deg);  animation-delay: 0.2s; }
    .cta:nth-child(3) { transform: rotate(-1.5deg); animation-delay: 0.3s; }
    .cta:nth-child(4) { transform: rotate(2deg);  animation-delay: 0.4s; }

    @keyframes pillIn {
      from { opacity: 0; transform: translateY(40px) rotate(0deg); }
      to   { opacity: 1; }
    }

    /* Interaction States */
    .cta:hover {
      transform: rotate(0deg) translate(-6px, -8px) scale(1.02) !important;
      box-shadow: clamp(12px, 2vw, 24px) clamp(12px, 2vw, 24px) 0 var(--ink);
      filter: brightness(1.08);
      z-index: 10;
    }
    
    .cta:active, 
    .cta.is-pressed {
      transform: rotate(0deg) translate(8px, 10px) scale(0.98) !important;
      box-shadow: 2px 2px 0 var(--ink);
      filter: brightness(0.92);
      transition-duration: 0.05s;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--ink);
      border-top: 4px solid var(--ink);
      padding: clamp(16px, 2vw, 24px) 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    footer p {
      font-family: 'Syne Mono', monospace;
      font-size: clamp(12px, 1.5vw, 16px);
      letter-spacing: 0.1em;
      color: var(--bg);
      text-transform: uppercase;
      text-align: center;
    }

    footer p span {
      color: var(--pink);
    }

    /* ── TOAST ── */
    #toast-area {
      position: fixed;
      bottom: clamp(60px, 8vw, 100px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 9998;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      pointer-events: none;
    }
    .toast {
      background: var(--ink);
      color: var(--bg);
      border: 3px solid var(--ink);
      box-shadow: 6px 6px 0 rgba(0,0,0,0.4);
      padding: 12px 24px;
      font-family: 'Syne Mono', monospace;
      font-size: clamp(12px, 2vw, 16px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      animation: toastIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(20px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>

  <script>
    // ── CUSTOM CURSOR ──
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });
    document.querySelectorAll('.cta').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('grow'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('grow'));
    });

    // ── RAW SYNTH AUDIO ──
    let audioCtx;
    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playDown() {
      initAudio();
      const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(120, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.05);
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
      osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }
    function playUp() {
      initAudio();
      const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.07);
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.07);
      osc.start(); osc.stop(audioCtx.currentTime + 0.07);
    }

    // ── TOAST MESSAGES ──
    function showToast(msg) {
      const area = document.getElementById('toast-area');
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      area.appendChild(t);
      setTimeout(() => {
        t.style.opacity = '0';
        t.style.transform = 'translateY(10px) scale(0.9)';
        t.style.transition = 'all 0.2s ease';
        setTimeout(() => t.remove(), 200);
      }, 2000);
    }

    // ── INTERACTIVE LOGIC (Random Click Simulation) ──
    const buttons = document.querySelectorAll('.cta');
    buttons.forEach((btn, i) => {
      let target = null, pressed = false;

      const press = () => {
        if (pressed) return;
        pressed = true;
        playDown();
        let ri = Math.floor(Math.random() * buttons.length);
        while (ri === i) ri = Math.floor(Math.random() * buttons.length);
        target = buttons[ri];
        target.classList.add('is-pressed');
      };

      const release = () => {
        if (!pressed) return;
        pressed = false;
        playUp();
        if (target) { target.classList.remove('is-pressed'); target = null; }
      };

      btn.addEventListener('mousedown', press);
      btn.addEventListener('mouseup', release);
      btn.addEventListener('mouseleave', () => { if (pressed) release(); });
      btn.addEventListener('touchstart', () => {}, { passive: true });
      btn.addEventListener('touchend', release);
      btn.addEventListener('touchcancel', release);
      
      btn.addEventListener('click', () => {
        const label = btn.getAttribute('data-label');
        showToast('Connecting: ' + label + ' ✦');
        press();
        setTimeout(release, 150);
      });
    });
  </script>
